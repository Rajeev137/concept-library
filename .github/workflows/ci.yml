name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Fail if SUPABASE_SERVICE_ROLE_KEY is referenced outside app/api/**
      # Per contract: service-role key must never appear in components, hooks, or middleware HTML.
      - name: Secret-location guard
        run: |
          VIOLATIONS=$(grep -r "SUPABASE_SERVICE_ROLE_KEY" src/ \
            --include="*.ts" --include="*.tsx" \
            --exclude-dir="app/api" \
            -l || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: SUPABASE_SERVICE_ROLE_KEY referenced outside app/api/:"
            echo "$VIOLATIONS"
            exit 1
          fi

      - name: Run tests
        run: npm test
        env:
          # Tests use the anon key + test Supabase project — no real service-role key in CI
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.TEST_UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.TEST_UPSTASH_REDIS_REST_TOKEN }}
